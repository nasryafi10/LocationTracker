name: Build Kotlin APK

on:
  push:
    branches: [ main, master ] # يعمل عند الرفع على فرع main أو master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # مشاريع كوتلين الحديثة تتطلب غالباً Java 17 أو Java 21
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' 

    # منح صلاحية التنفيذ لملف الـ Gradle الخاص بالمشروع
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # تشغيل أمر بناء نسخة الـ APK التجريبية
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # رفع ملف الـ APK الناتج لتتمكن من تحميله
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kotlin-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
