name: Mobile APK Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # تفعيل التخزين المؤقت لتفادي أخطاء التحميل

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # تم إضافة خيار تفصيل الأخطاء وعزل الذاكرة المتعارضة
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Kotlin-App
        path: app/build/outputs/apk/debug/app-debug.apk
