name: Mobile APK Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # تم التحديث إلى جافا 21 لتوافقية أفضل مع مشاريع كوتلين الجديدة
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # تشغيل البناء مع ميزة عرض تفاصيل الأخطاء في حال فشل مجدداً
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Kotlin-App
        path: app/build/outputs/apk/debug/app-debug.apk
